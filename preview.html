<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Web App Pemantauan Sampel</title>

<style>
    *{
        box-sizing:border-box;
        margin:0;
        padding:0;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#f4f6f9;
        color:#333;
        padding:16px;
    }

    .container{
        max-width:1200px;
        margin:auto;
    }

    h1{
        margin-bottom:10px;
        text-align:center;
    }

    .label-simulasi{
        display:inline-block;
        background:#fff3cd;
        color:#856404;
        border:1px solid #ffe69c;
        padding:8px 12px;
        border-radius:8px;
        margin-bottom:16px;
        font-weight:bold;
    }

    .stats{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
        gap:16px;
        margin-bottom:20px;
    }

    .card{
        background:white;
        border-radius:12px;
        padding:20px;
        box-shadow:0 2px 8px rgba(0,0,0,0.08);
    }

    .card h3{
        font-size:15px;
        color:#666;
        margin-bottom:8px;
    }

    .card .value{
        font-size:32px;
        font-weight:bold;
    }

    .attention-card .value{
        color:#c62828;
    }

    .controls{
        display:flex;
        gap:10px;
        flex-wrap:wrap;
        margin-bottom:16px;
    }

    button{
        border:none;
        padding:10px 16px;
        border-radius:8px;
        cursor:pointer;
        background:#1976d2;
        color:white;
        font-weight:bold;
    }

    button:hover{
        opacity:0.9;
    }

    .table-container{
        overflow-x:auto;
        background:white;
        border-radius:12px;
        box-shadow:0 2px 8px rgba(0,0,0,0.08);
        margin-bottom:24px;
    }

    table{
        width:100%;
        border-collapse:collapse;
    }

    th{
        background:#1976d2;
        color:white;
    }

    th, td{
        padding:12px;
        border:1px solid #ddd;
        text-align:left;
    }

    tr.attention{
        background:#fdeaea;
    }

    .chart-section{
        background:white;
        padding:20px;
        border-radius:12px;
        box-shadow:0 2px 8px rgba(0,0,0,0.08);
    }

    .chart-title{
        font-size:20px;
        margin-bottom:16px;
    }

    .chart-item{
        margin-bottom:18px;
    }

    .sample-label{
        font-weight:bold;
        margin-bottom:6px;
    }

    .bars{
        display:flex;
        flex-direction:column;
        gap:6px;
    }

    .bar-row{
        display:flex;
        align-items:center;
        gap:10px;
    }

    .bar-name{
        width:140px;
        font-size:13px;
        flex-shrink:0;
    }

    .bar-container{
        flex:1;
        background:#eceff1;
        border-radius:20px;
        overflow:hidden;
        height:24px;
    }

    .bar{
        height:100%;
        color:white;
        font-size:12px;
        display:flex;
        align-items:center;
        justify-content:flex-end;
        padding-right:8px;
        font-weight:bold;
        min-width:40px;
    }

    .waiting{
        background:#1976d2;
    }

    .limit{
        background:#43a047;
    }

    .legend{
        display:flex;
        gap:20px;
        margin-bottom:20px;
        flex-wrap:wrap;
    }

    .legend-item{
        display:flex;
        align-items:center;
        gap:8px;
    }

    .legend-box{
        width:16px;
        height:16px;
        border-radius:4px;
    }

    @media(max-width:768px){
        .bar-name{
            width:90px;
        }
    }
</style>
</head>
<body>

<div class="container">

    <h1>Mini Web App Pemantauan Sampel</h1>

    <div class="label-simulasi">
        Data Simulasi untuk Latihan Sahaja
    </div>

    <div class="stats">
        <div class="card">
            <h3>Jumlah Keseluruhan Sampel</h3>
            <div class="value" id="totalCount">0</div>
        </div>

        <div class="card attention-card">
            <h3>Jumlah Perlu Perhatian</h3>
            <div class="value" id="attentionCount">0</div>
        </div>
    </div>

    <div class="controls">
        <button onclick="showAll()">Semua Sampel</button>
        <button onclick="showAttention()">Perlu Perhatian</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Kod Sampel</th>
                    <th>Jenis Sampel</th>
                    <th>Tempoh Menunggu (Jam)</th>
                    <th>Had Masa (Jam)</th>
                    <th>Keadaan</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="chart-section">
        <div class="chart-title">
            Graf Tempoh Menunggu Jam vs Had Masa Jam
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-box" style="background:#1976d2;"></div>
                Tempoh Menunggu
            </div>

            <div class="legend-item">
                <div class="legend-box" style="background:#43a047;"></div>
                Had Masa
            </div>
        </div>

        <div id="chartContainer"></div>
    </div>

</div>

<script>

const data = [
    {
        kodSampel:"SMP-001",
        jenisSampel:"Darah",
        tempohMenunggu:2,
        hadMasa:6,
        keadaan:"Baik"
    },
    {
        kodSampel:"SMP-002",
        jenisSampel:"Swab",
        tempohMenunggu:8,
        hadMasa:6,
        keadaan:"Lewat"
    },
    {
        kodSampel:"SMP-003",
        jenisSampel:"Serum",
        tempohMenunggu:4,
        hadMasa:8,
        keadaan:"Baik"
    },
    {
        kodSampel:"SMP-004",
        jenisSampel:"Tisu",
        tempohMenunggu:13,
        hadMasa:12,
        keadaan:"Lewat"
    },
    {
        kodSampel:"SMP-005",
        jenisSampel:"Najis",
        tempohMenunggu:3,
        hadMasa:6,
        keadaan:"Bekas Bocor"
    },
    {
        kodSampel:"SMP-006",
        jenisSampel:"Darah",
        tempohMenunggu:7,
        hadMasa:6,
        keadaan:"Lewat"
    },
    {
        kodSampel:"SMP-007",
        jenisSampel:"Swab",
        tempohMenunggu:2,
        hadMasa:6,
        keadaan:"Baik"
    },
    {
        kodSampel:"SMP-008",
        jenisSampel:"Serum",
        tempohMenunggu:5,
        hadMasa:8,
        keadaan:"Label Tidak Lengkap"
    }
];

function perluPerhatian(rekod){
    return (
        rekod.tempohMenunggu > rekod.hadMasa ||
        rekod.keadaan !== "Baik"
    );
}

function updateStats(){
    const total = data.length;

    const attention = data.filter(
        rekod => perluPerhatian(rekod)
    ).length;

    document.getElementById("totalCount").textContent = total;
    document.getElementById("attentionCount").textContent = attention;
}

function renderTable(records){

    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    records.forEach(rekod => {

        const attention = perluPerhatian(rekod);

        const tr = document.createElement("tr");

        if(attention){
            tr.classList.add("attention");
        }

        tr.innerHTML = `
            <td>${rekod.kodSampel}</td>
            <td>${rekod.jenisSampel}</td>
            <td>${rekod.tempohMenunggu}</td>
            <td>${rekod.hadMasa}</td>
            <td>${rekod.keadaan}</td>
            <td>${attention ? "Perlu Perhatian" : "Normal"}</td>
        `;

        tbody.appendChild(tr);

    });

}

function renderChart(){

    const container = document.getElementById("chartContainer");
    container.innerHTML = "";

    const maxValue = Math.max(
        ...data.flatMap(d => [d.tempohMenunggu, d.hadMasa])
    );

    data.forEach(rekod => {

        const item = document.createElement("div");
        item.className = "chart-item";

        const waitingWidth =
            (rekod.tempohMenunggu / maxValue) * 100;

        const limitWidth =
            (rekod.hadMasa / maxValue) * 100;

        item.innerHTML = `
            <div class="sample-label">
                ${rekod.kodSampel}
            </div>

            <div class="bars">

                <div class="bar-row">
                    <div class="bar-name">
                        Tempoh Menunggu
                    </div>

                    <div class="bar-container">
                        <div class="bar waiting"
                             style="width:${waitingWidth}%">
                            ${rekod.tempohMenunggu}
                        </div>
                    </div>
                </div>

                <div class="bar-row">
                    <div class="bar-name">
                        Had Masa
                    </div>

                    <div class="bar-container">
                        <div class="bar limit"
                             style="width:${limitWidth}%">
                            ${rekod.hadMasa}
                        </div>
                    </div>
                </div>

            </div>
        `;

        container.appendChild(item);

    });

}

function showAll(){
    renderTable(data);
}

function showAttention(){
    const filtered = data.filter(
        rekod => perluPerhatian(rekod)
    );

    renderTable(filtered);
}

function init(){
    updateStats();
    renderTable(data);
    renderChart();
}

init();

</script>

</body>
</html>
